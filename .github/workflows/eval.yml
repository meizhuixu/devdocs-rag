name: Eval

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/devdocs_rag/retrieval/**"
      - "src/devdocs_rag/generation/**"
      - "eval/datasets/**"
      - "eval/metrics.py"
      - "eval/ragas_runner.py"

jobs:
  eval-retrieval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install deps
        run: uv pip install -e ".[dev]" --system

      - name: Validate golden dataset
        # Verifies the JSONL is well-formed and all items parse correctly.
        # Always runs — no Qdrant needed.
        run: python -m eval.ragas_runner --dataset eval/datasets/golden_qa.jsonl --validate-only

      - name: Run retrieval eval (gating — recall@10 ≥ 0.70)
        # Requires a live Qdrant instance with the indexed corpus.
        # In CI without Qdrant, all 50 queries are skipped and the runner exits 0
        # (skipped items are not counted as failures).
        # Threshold: 0.70 — prod baseline is 0.79 (bge-base, Phase 5 M4); 9% buffer
        # absorbs corpus drift and minor retrieval regressions.  Fails hard if
        # Qdrant is up but recall@10 drops below 0.70.
        run: python -m eval.ragas_runner --dataset eval/datasets/golden_qa.jsonl --top-k 10 --min-recall 0.70
        env:
          QDRANT_URL: "http://localhost:6333"
