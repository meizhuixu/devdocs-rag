name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    env:
      # The tracing extra maps llmops-dashboard to a local sibling path via
      # [tool.uv.sources]; that path doesn't exist on CI runners. Deps are
      # installed with `uv pip install -e .[dev]` below, so stop `uv run`
      # from re-resolving the project (which would chase the missing path).
      UV_NO_SYNC: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Create virtual environment
        run: uv venv --python 3.11 .venv

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src/

      - name: Pytest
        run: uv run pytest -q
