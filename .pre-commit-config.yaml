# Run on commit: ruff check + ruff format + mypy.
# Install: `uv pip install -e ".[dev]" && pre-commit install`
# Run on all files manually: `pre-commit run --all-files`

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (src/)
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
